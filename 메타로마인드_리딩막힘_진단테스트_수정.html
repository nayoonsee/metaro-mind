<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타로마인드 | 리딩 막힘 유형 진단 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;font-weight:300;background:#FAFAFA;color:#333;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:2rem 1.5rem}
.intro{text-align:center;padding:3rem 0 2rem}
.brand{font-size:11px;letter-spacing:.3em;color:#888;text-transform:uppercase;margin-bottom:1rem}
.ititle{font-family:'Noto Serif KR',serif;font-size:clamp(22px,5vw,32px);font-weight:300;color:#2C1A5C;line-height:1.5;margin-bottom:.75rem}
.isub{font-size:14px;color:#888;line-height:1.9;margin-bottom:1.5rem}
.notice{background:#EBF5FB;border-left:4px solid #2980B9;border-radius:0 8px 8px 0;padding:1rem 1.25rem;margin-bottom:1.5rem;text-align:left}
.notice p{font-size:13px;color:#1A5276;line-height:1.8}
.notice strong{color:#1565C0;font-weight:500}
.start-btn{background:#4A2C8C;color:#fff;border:none;padding:12px 40px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s}
.start-btn:hover{opacity:.85}
.prog-wrap{margin-bottom:1.5rem}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:6px}
.prog-bar{height:4px;background:#E0E0E0;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:#4A2C8C;border-radius:99px;transition:width .4s ease}
.q-num{font-size:10px;letter-spacing:.15em;color:#888;text-transform:uppercase;margin-bottom:.3rem}
.q-cat{font-size:12px;color:#4A2C8C;font-weight:500;margin-bottom:.875rem}
.q-text{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:400;color:#2C1A5C;line-height:1.65;margin-bottom:1.25rem}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:.875rem 1rem;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .2s}
.opt:hover{border-color:#4A2C8C;background:#EDE7F6}
.opt.sel{border:2px solid #4A2C8C;background:#EDE7F6}
.opt-lbl{font-size:13px;font-weight:500;color:#aaa;min-width:18px;flex-shrink:0;margin-top:1px}
.opt.sel .opt-lbl{color:#4A2C8C}
.opt-txt{font-size:14px;color:#555;line-height:1.65}
.opt.sel .opt-txt{color:#2C1A5C}
.nav{display:flex;justify-content:space-between;margin-top:1.5rem}
.prev-btn{background:#fff;border:1px solid #DDD;color:#888;padding:9px 22px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.prev-btn:hover{border-color:#4A2C8C;color:#4A2C8C}
.prev-btn:disabled{opacity:.3;cursor:not-allowed}
.next-btn{background:#4A2C8C;color:#fff;border:none;padding:9px 26px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s}
.next-btn:hover{opacity:.85}
.next-btn:disabled{opacity:.3;cursor:not-allowed}
.r-head{text-align:center;padding:1.5rem 0 1rem}
.r-badge{display:inline-block;font-size:11px;padding:4px 14px;border-radius:99px;background:#F3F3F3;color:#888;border:1px solid #E0E0E0;margin-bottom:.75rem}
.r-main{font-family:'Noto Serif KR',serif;font-size:22px;font-weight:400;color:#2C1A5C;margin-bottom:.3rem}
.r-sub{font-size:13px;color:#666;margin-bottom:.75rem}
.score-card{background:#F8F6FF;border-radius:10px;padding:1rem 1.25rem;margin:1rem 0}
.sc-title{font-size:10px;letter-spacing:.15em;color:#888;text-transform:uppercase;margin-bottom:.875rem}
.srow{margin-bottom:.75rem}.srow:last-child{margin-bottom:0}
.sinfo{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.sname{color:#666}.snum{font-weight:500;color:#333}
.sbar{height:5px;background:#E0E0E0;border-radius:99px;overflow:hidden}
.sfill{height:100%;border-radius:99px;transition:width .8s ease}
.good-box{background:#EAFAF1;border-left:4px solid #27AE60;border-radius:0 8px 8px 0;padding:.875rem 1rem;margin:.75rem 0}
.good-title{font-size:12px;font-weight:500;color:#1B5E20;margin-bottom:.3rem}
.good-desc{font-size:12px;color:#1B5E20;line-height:1.7;opacity:.9}
.rcard{background:#fff;border:1px solid #E8E8E8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:.75rem}
.rcard-title{font-size:13px;font-weight:500;color:#2C1A5C;margin-bottom:.5rem}
.rcard-text{font-size:13px;color:#555;line-height:1.8}
.rcard-text strong{color:#2C1A5C;font-weight:500}
.rcard-text em{color:#C0392B;font-style:normal}
.restart{width:100%;background:#fff;border:1px solid #DDD;color:#888;padding:10px;border-radius:6px;font-size:13px;cursor:pointer;margin-top:.75rem;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.restart:hover{border-color:#4A2C8C;color:#4A2C8C}
.hidden{display:none}
footer{text-align:center;padding:2rem;font-size:12px;color:#CCC}
</style>
</head>
<body>
<div class="container">

<div id="intro">
  <div class="intro">
    <div class="brand">Metaro Mind · 상담사 전용</div>
    <h1 class="ititle">나는 왜 리딩이 막히는가?<br>리딩 막힘 유형 진단 테스트</h1>
    <p class="isub">실제 상담 현장 시나리오 15문항으로<br>나의 리딩 막힘 유형을 진단합니다.</p>
    <div class="notice">
      <p><strong>이 테스트는 잘하고 못하고를 보는 게 아닙니다.</strong><br>
      지금 나의 리딩 패턴을 있는 그대로 보는 거예요.<br>
      정답은 없습니다. <strong>솔직할수록 코칭이 정확해집니다.</strong><br>
      각 문항에서 지금의 나에게 가장 가까운 것을 하나만 고르세요.</p>
    </div>
    <button class="start-btn" onclick="startTest()">진단 시작하기</button>
  </div>
</div>

<div id="test" class="hidden">
  <div class="prog-wrap">
    <div class="prog-row"><span>진행 중</span><span id="prog-cnt">1 / 15</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:7%"></div></div>
  </div>
  <div class="q-num" id="q-num">문항 01</div>
  <div class="q-cat" id="q-cat"></div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="opts"></div>
  <div class="nav">
    <button class="prev-btn" id="prev-btn" onclick="prevQ()" disabled>← 이전</button>
    <button class="next-btn" id="next-btn" onclick="nextQ()" disabled>다음 →</button>
  </div>
</div>

<div id="result" class="hidden">
  <div class="r-head">
    <div class="r-badge">나의 리딩 막힘 진단 결과</div>
    <div class="r-main" id="r-main"></div>
    <div class="r-sub" id="r-sub"></div>
  </div>
  <div class="score-card">
    <div class="sc-title">막힘 유형별 점수</div>
    <div id="score-bars"></div>
  </div>
  <div id="r-good"></div>
  <div id="r-cards"></div>
  <button class="restart" onclick="restart()">다시 진단하기</button>
</div>

</div>
<footer>© METARO MIND · 메타로마인드 · 이나윤</footer>

    cause:"인지 부하 이론(Cognitive Load Theory, Sweller) — 구조 없이 진행되는 리딩은 상담사와 내담자 모두에게 인지 과부하를 일으킵니다. 즉흥적 판단이 많아질수록 리딩 품질이 불안정해집니다.",
    fix:"카드 뒤집기 전 포지션 인지 훈련 / 배열 선택 이유 명확화 / 구조적 리딩 흐름 체계화"},
  K:{name:"🔵 지식 단절형",color:"#2980B9",
    desc:"카드 지식은 있는데 내담자 상황으로 연결이 안 됩니다. 아는 것과 적용하는 것은 다른 능력입니다.",
    cause:"학습 전이 이론(Transfer of Learning, Thorndike) — 선언적 지식(카드 뜻 암기)은 있지만 절차적 지식(실전 적용)이 부족한 상태. 공부와 실전 사이의 다리가 없습니다.",
    fix:"카드 설명 후 연결 문장 훈련 / '이 카드가 선생님 상황에서는...' 패턴 습관화 / 실전 케이스 반복 연습"},
  T:{name:"🟠 전달 과잉형",color:"#E67E22",
    desc:"상담사가 말이 너무 많아서 내담자가 말할 기회가 없습니다. 좋은 리딩은 내담자가 더 많이 이야기하게 만드는 것입니다.",
    cause:"인간 중심 치료(Carl Rogers) — 내담자가 스스로 답을 찾도록 돕는 것이 핵심. 상담사의 말이 많은 것은 불안의 표현이기도 하며, 침묵을 견디지 못하는 패턴과 연결됩니다.",
    fix:"침묵 3초 훈련 / 내담자 말 비율 높이기 / 핵심 한 문장 전달 후 멈추기 연습"},
  I:{name:"🟣 감각 의존형",color:"#8E44AD",
    desc:"구조 없이 느낌으로만 읽습니다. 직관은 훈련된 경험에서 나옵니다. 구조 위에 직관을 올려야 진짜 전문가입니다.",
    cause:"패턴 인식 이론(Pattern Recognition, Klein) + 확증 편향(Confirmation Bias) — 진짜 직관은 오랜 훈련과 경험이 쌓인 패턴 인식입니다. 구조 없는 직관 의존은 역전이(Countertransference) 위험도 높입니다.",
    fix:"직관에 근거 붙이기 훈련 / '이렇게 느껴지는 이유는...' 설명 훈련 / 구조 위에 직관 올리기"}
};

var cur=0,ans=new Array(15).fill(null);

function startTest(){document.getElementById('intro').classList.add('hidden');document.getElementById('test').classList.remove('hidden');render();}

function render(){
  var q=Qs[cur];
  document.getElementById('q-num').textContent='문항 '+q.num;
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('prog-cnt').textContent=(cur+1)+' / 15';
  document.getElementById('prog-fill').style.width=Math.round(((cur+1)/15)*100)+'%';
  var o=document.getElementById('opts');o.innerHTML='';
  q.opts.forEach(function(opt,i){
    var d=document.createElement('div');
    d.className='opt'+(ans[cur]===i?' sel':'');
    d.innerHTML='<span class="opt-lbl">'+opt.l+'</span><span class="opt-txt">'+opt.t+'</span>';
    d.onclick=function(){select(i);};
    o.appendChild(d);
  });
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=ans[cur]===null;
  document.getElementById('next-btn').textContent=cur===14?'결과 보기':'다음 →';
}

function select(i){ans[cur]=i;document.querySelectorAll('.opt').forEach(function(el,idx){el.classList.toggle('sel',idx===i);});document.getElementById('next-btn').disabled=false;}
function nextQ(){if(cur<14){cur++;render();}else showResult();}
function prevQ(){if(cur>0){cur--;render();}}

function showResult(){
  document.getElementById('test').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  var sc={Q:0,S:0,K:0,T:0,I:0,C:0};
  Qs.forEach(function(q,i){if(ans[i]!==null)sc[q.opts[ans[i]].s]++;});
  var sorted=Object.entries(sc).filter(function(e){return e[0]!=='C';}).sort(function(a,b){return b[1]-a[1];});
  var main=sorted[0][0],sub=sorted[1][0];
  var cCount=sc['C'];
  var isGood=cCount>=10;

  if(isGood){
    document.getElementById('r-main').textContent='✅ 리딩 구조화가 잘 되어 있어요';
    document.getElementById('r-sub').textContent='건강한 패턴 '+cCount+'개 · 다음 단계로 넘어갈 준비가 됐습니다';
  } else {
    document.getElementById('r-main').textContent=TD[main].name;
    document.getElementById('r-sub').textContent='보조 막힘 유형: '+TD[sub].name;
  }

  var barOrder=[{k:'Q',l:'🔴 질문 표류형',c:'#E74C3C'},{k:'S',l:'🟡 구조 부재형',c:'#F39C12'},{k:'K',l:'🔵 지식 단절형',c:'#2980B9'},{k:'T',l:'🟠 전달 과잉형',c:'#E67E22'},{k:'I',l:'🟣 감각 의존형',c:'#8E44AD'},{k:'C',l:'✅ 교정됨',c:'#27AE60'}];
  document.getElementById('score-bars').innerHTML=barOrder.map(function(b){
    return '<div class="srow"><div class="sinfo"><span class="sname">'+b.l+'</span><span class="snum">'+sc[b.k]+'개</span></div><div class="sbar"><div class="sfill" style="width:'+Math.round((sc[b.k]/15)*100)+'%;background:'+b.c+'"></div></div></div>';
  }).join('');

  document.getElementById('r-good').innerHTML=cCount>0?
    '<div class="good-box"><div class="good-title">✅ 건강한 리딩 패턴 '+cCount+'개</div><div class="good-desc">'+(cCount>=10?'전반적으로 리딩 구조화가 잘 되어 있습니다. 코칭에서는 더 정교한 조합과 타이밍을 다듬어갈게요.':cCount>=6?'절반 이상에서 건강한 패턴이 나왔습니다. 조금 더 의식적으로 적용하면 빠르게 성장할 수 있어요.':'아직 건강한 패턴이 자리잡는 중입니다. 코칭에서 집중적으로 교정할게요.')+'</div></div>':'';

  var html='';
  if(!isGood){
    var md=TD[main],sd=TD[sub];
    html+=
      '<div class="rcard"><div class="rcard-title">'+md.name+' — 주 막힘 유형</div><div class="rcard-text">'+md.desc+'</div></div>'+
      '<div class="rcard"><div class="rcard-title">심리학적 원인</div><div class="rcard-text"><em>'+md.cause+'</em></div></div>'+
      '<div class="rcard"><div class="rcard-title">코칭에서 집중할 부분</div><div class="rcard-text"><strong>'+md.fix+'</strong></div></div>';
    if(sd&&TD[sd]){
      html+='<div class="rcard"><div class="rcard-title">'+TD[sd].name+' — 보조 막힘 유형</div><div class="rcard-text">'+TD[sd].desc+'<br><br><strong>교정 방향: '+TD[sd].fix+'</strong></div></div>';
    }
  }
  html+='<div class="rcard"><div class="rcard-title">이 결과를 코칭에서 활용하는 방법</div><div class="rcard-text">이 결과는 <strong>현재 내가 인식하는 리딩 패턴</strong>입니다.<br>실전 리딩 후 코칭 피드백과 비교해보세요.<br><strong>차이가 클수록 성장 가능성이 큽니다.</strong></div></div>';
  document.getElementById('r-cards').innerHTML=html;
}

function restart(){cur=0;ans=new Array(15).fill(null);document.getElementById('result').classList.add('hidden');document.getElementById('intro').classList.remove('hidden');}
</script>
</body>
</html>
