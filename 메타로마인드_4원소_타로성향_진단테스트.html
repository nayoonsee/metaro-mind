<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타로마인드 | 4원소 타로 성향 진단 테스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--purple:#4A2C8C;--purple-light:#EDE7F6;--dark:#2C1A5C;--gold:#B8860B;--gold-light:#FDF6E3;--text:#333;--muted:#888;--gray:#F8F8F8;--white:#fff;--danger:#C0392B;--success:#1B5E20;--info:#1565C0;
--fire:#E64A19;--fire-light:#FBE9E7;
--water:#1565C0;--water-light:#E3F2FD;
--air:#558B2F;--air-light:#F1F8E9;
--earth:#5D4037;--earth-light:#EFEBE9;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;font-weight:300;background:#FAFAFA;color:var(--text);min-height:100vh;}
.container{max-width:680px;margin:0 auto;padding:2rem 1.5rem;}
.intro{text-align:center;padding:3rem 0 2rem;}
.brand{font-size:11px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:1rem;}
.ititle{font-family:'Noto Serif KR',serif;font-size:clamp(22px,5vw,32px);font-weight:300;color:var(--dark);line-height:1.5;margin-bottom:.75rem;}
.isub{font-size:14px;color:var(--muted);line-height:1.9;margin-bottom:1.5rem;}
.basis-box{background:var(--purple-light);border-left:4px solid var(--purple);border-radius:0 8px 8px 0;padding:.875rem 1rem;margin-bottom:1.5rem;text-align:left;}
.basis-label{font-size:10px;letter-spacing:.15em;color:var(--purple);text-transform:uppercase;margin-bottom:.4rem;font-weight:500;}
.basis-text{font-size:12px;color:var(--dark);line-height:1.7;}
.start-btn{background:var(--purple);color:#fff;border:none;padding:12px 40px;border-radius:6px;font-size:15px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s;}
.start-btn:hover{opacity:.85;}
.prog-wrap{margin-bottom:1.5rem;}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.prog-bar{height:4px;background:#E0E0E0;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--purple);border-radius:99px;transition:width .4s ease;}
.q-meta{margin-bottom:1rem;}
.q-num{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:.3rem;}
.q-cat{font-size:12px;color:var(--purple);font-weight:500;margin-bottom:.2rem;}
.q-basis{font-size:11px;color:var(--muted);font-style:italic;margin-bottom:1rem;line-height:1.6;}
.q-text{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:400;color:var(--dark);line-height:1.65;margin-bottom:1.25rem;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:.875rem 1rem;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:all .2s;}
.opt:hover{border-color:var(--purple);background:var(--purple-light);}
.opt.sel{border:2px solid var(--purple);background:var(--purple-light);}
.opt-lbl{font-size:13px;font-weight:500;color:#aaa;min-width:18px;flex-shrink:0;margin-top:1px;}
.opt.sel .opt-lbl{color:var(--purple);}
.opt-txt{font-size:14px;color:#555;line-height:1.65;}
.opt.sel .opt-txt{color:var(--dark);}
.nav{display:flex;justify-content:space-between;margin-top:1.5rem;}
.prev-btn{background:#fff;border:1px solid #DDD;color:#888;padding:9px 22px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.prev-btn:hover{border-color:var(--purple);color:var(--purple);}
.prev-btn:disabled{opacity:.3;cursor:not-allowed;}
.next-btn{background:var(--purple);color:#fff;border:none;padding:9px 26px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity .2s;}
.next-btn:hover{opacity:.85;}
.next-btn:disabled{opacity:.3;cursor:not-allowed;}
/* RESULT */
.r-head{text-align:center;padding:1.5rem 0 1rem;}
.r-badge{display:inline-block;font-size:11px;padding:4px 14px;border-radius:99px;background:#F3F3F3;color:#888;border:1px solid #E0E0E0;margin-bottom:.75rem;}
.r-emoji{font-size:48px;margin-bottom:.5rem;}
.r-main{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:400;color:var(--dark);margin-bottom:.25rem;}
.r-sub{font-size:14px;color:#666;margin-bottom:.5rem;}
.r-combo{font-size:13px;color:#888;margin-bottom:.75rem;}
.score-card{background:#F8F6FF;border-radius:10px;padding:1rem 1.25rem;margin:1rem 0;}
.sc-title{font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:.875rem;}
.srow{margin-bottom:.75rem;}.srow:last-child{margin-bottom:0;}
.sinfo{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.sname{color:#666;}.snum{font-weight:500;color:var(--dark);}
.sbar{height:5px;background:#E0E0E0;border-radius:99px;overflow:hidden;}
.sfill{height:100%;border-radius:99px;transition:width .8s ease;}
.rcard{background:#fff;border:1px solid #E8E8E8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:.75rem;}
.rcard-title{font-size:13px;font-weight:500;color:var(--dark);margin-bottom:.5rem;}
.rcard-text{font-size:13px;color:#555;line-height:1.8;}
.rcard-text strong{color:var(--dark);font-weight:500;}
.rcard-text em{color:var(--danger);font-style:normal;}
.combo-box{background:var(--purple-light);border-radius:10px;padding:1rem 1.25rem;margin-bottom:.75rem;}
.combo-title{font-size:12px;color:var(--purple);font-weight:500;margin-bottom:.5rem;}
.combo-text{font-size:13px;color:var(--dark);line-height:1.75;}
.notice-box{background:#FFF8E1;border-left:4px solid #F9A825;border-radius:0 8px 8px 0;padding:.875rem 1rem;margin-bottom:.75rem;}
.notice-text{font-size:13px;color:#555;line-height:1.75;}
.restart{width:100%;background:#fff;border:1px solid #DDD;color:#888;padding:10px;border-radius:6px;font-size:13px;cursor:pointer;margin-top:.75rem;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.restart:hover{border-color:var(--purple);color:var(--purple);}
.hidden{display:none;}
footer{text-align:center;padding:2rem;font-size:12px;color:#CCC;}
</style>
</head>
<body>
<div class="container">

<div id="intro">
  <div class="intro">
    <div class="brand">Metaro Mind · 상담사 전용</div>
    <h1 class="ititle">나는 어떤 원소 성향의<br>타로 상담사인가?</h1>
    <p class="isub">20문항으로 나의 4원소 타로 성향을 진단합니다.<br>주 원소와 보조 원소, 그리고 나만의 리딩 스타일까지.<br><br>정답은 없습니다.<br>지금 실제 상담에서 하는 행동을 기준으로 선택하세요.</p>
    <div class="basis-box">
      <div class="basis-label">심리학적 기반</div>
      <div class="basis-text">DISC 행동유형 · 융 심리 기능 이론 · 에니어그램 핵심 두려움 · 스트레스 반응 이론 · 교류분석 TA</div>
    </div>
    <button class="start-btn" onclick="startTest()">진단 시작하기</button>
  </div>
</div>

<div id="test" class="hidden">
  <div class="prog-wrap">
    <div class="prog-row"><span>진행 중</span><span id="prog-cnt">1 / 20</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:5%"></div></div>
  </div>
  <div class="q-meta">
    <div class="q-num" id="q-num">문항 01</div>
    <div class="q-cat" id="q-cat"></div>
    <div class="q-basis" id="q-basis"></div>
  </div>
  <div class="q-text" id="q-text"></div>
  <div class="opts" id="opts"></div>
  <div class="nav">
    <button class="prev-btn" id="prev-btn" onclick="prevQ()" disabled>← 이전</button>
    <button class="next-btn" id="next-btn" onclick="nextQ()" disabled>다음 →</button>
  </div>
</div>

<div id="result" class="hidden">
  <div class="r-head">
    <div class="r-badge">나의 4원소 타로 성향 진단 결과</div>
    <div class="r-emoji" id="r-emoji"></div>
    <div class="r-main" id="r-main"></div>
    <div class="r-sub" id="r-sub"></div>
    <div class="r-combo" id="r-combo"></div>
  </div>
  <div class="score-card">
    <div class="sc-title">원소별 점수</div>
    <div id="score-bars"></div>
  </div>
  <div id="r-cards"></div>
  <button class="restart" onclick="restart()">다시 진단하기</button>
</div>

</div>
<footer>© METARO MIND · 메타로마인드 · 이나윤</footer>

<script>
// 가중치: 01~03, 05, 08, 10, 20 = ×3 / 04, 06, 07, 09, 11, 13, 15, 16, 18, 19 = ×2 / 12, 14, 17 = ×1
// A=흙(펜타클P) B=물(컵C) C=바람(소드S) D=불(완드W)
var Qs=[
  {num:"01",cat:"리딩 시작 방식",basis:"DISC 행동유형 — 리딩 시작 방식에서 에너지 방향이 드러납니다",wt:3,
   text:"상담이 시작되면 나는 주로 어떻게 리딩을 시작하는가?",

         {l:"B",t:"내담자의 감정 상태를 먼저 확인하고 편안한 분위기를 만든 뒤 자연스럽게 시작한다",e:"C"},
         {l:"C",t:"카드를 펼치면서 떠오르는 이미지와 느낌을 바로 이야기하며 시작한다",e:"S"},

   text:"내담자가 모호하거나 복잡한 질문을 가져왔을 때 나는?",
   opts:[{l:"A",t:"질문을 구체적으로 정리될 때까지 되물으며 명확하게 만든다",e:"P"},
         {l:"B",t:"내담자가 하고 싶은 말을 충분히 들은 뒤 함께 질문을 정리한다",e:"C"},
         {l:"C",t:"일단 카드를 뽑아보고 카드가 이끄는 방향으로 질문을 잡아간다",e:"S"},
         {l:"D",t:"내담자의 핵심 고민을 빠르게 파악하고 내가 질문을 정리해서 진행한다",e:"W"}]},
  {num:"03",cat:"카드 해석 접근법",basis:"인지 처리 방식 — 분석형(하향식) vs 직관형(상향식)",wt:3,

         {l:"B",t:"카드에서 느껴지는 감정과 에너지를 중심으로 내담자와 연결한다",e:"C"},

  {num:"04",cat:"어려운 카드 처리",basis:"에니어그램 — 핵심 두려움이 부정 카드 처리 방식에 나타남",wt:2,

         {l:"B",t:"내담자가 놀라지 않도록 부드럽게 감싸면서 긍정적인 면을 먼저 이야기한다",e:"C"},
         {l:"C",t:"카드의 상징을 흥미롭게 풀어내며 새로운 시각으로 전환시킨다",e:"S"},
         {l:"D",t:"직접적으로 카드의 메시지를 전달하고 어떻게 대응할지 행동 방향을 제시한다",e:"W"}]},

var cur=0,ans=[];
function startTest(){document.getElementById('intro').classList.add('hidden');document.getElementById('test').classList.remove('hidden');renderQ();}
function renderQ(){
  var q=Qs[cur];
  document.getElementById('q-num').textContent='문항 '+q.num;
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-basis').textContent=q.basis;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('prog-cnt').textContent=(cur+1)+' / '+Qs.length;
  document.getElementById('prog-fill').style.width=((cur+1)/Qs.length*100)+'%';
  var html='';
  q.opts.forEach(function(o,i){
    var sel=ans[cur]===i?'sel':'';
    html+='<div class="opt '+sel+'" onclick="selOpt('+i+')"><span class="opt-lbl">'+o.l+'</span><span class="opt-txt">'+o.t+'</span></div>';
  });
  document.getElementById('opts').innerHTML=html;
  document.getElementById('prev-btn').disabled=cur===0;
  document.getElementById('next-btn').disabled=ans[cur]===undefined;
  document.getElementById('next-btn').textContent=cur===Qs.length-1?'결과 보기':'다음 →';
}
function selOpt(i){
  ans[cur]=i;
  document.querySelectorAll('.opt').forEach(function(el,idx){el.classList.toggle('sel',idx===i);});
  document.getElementById('next-btn').disabled=false;
}
function nextQ(){
  if(ans[cur]===undefined)return;
  if(cur===Qs.length-1){showResult();return;}
  cur++;renderQ();
}
function prevQ(){if(cur>0){cur--;renderQ();}}
function showResult(){
  var scores={P:0,C:0,S:0,W:0};
  Qs.forEach(function(q,i){
    if(ans[i]!==undefined){scores[q.opts[ans[i]].e]+=q.wt;}
  });
  var sorted=Object.keys(scores).sort(function(a,b){return scores[b]-scores[a];});
  var main=sorted[0],sub=sorted[1];
  var total=Object.values(scores).reduce(function(a,b){return a+b;},0);
  var el=ELEMENTS[main],subEl=ELEMENTS[sub];
  document.getElementById('r-emoji').textContent=el.emoji;
  document.getElementById('r-main').textContent=el.name+' — '+el.title;
  document.getElementById('r-sub').textContent=el.desc;
  document.getElementById('r-combo').textContent='보조 원소: '+subEl.emoji+' '+subEl.name;

  var barsHtml='';
  var order=['W','C','S','P'];
  var eNames={'W':'🔥 완드(불)','C':'🌊 컵(물)','S':'⚔️ 소드(바람)','P':'🪙 펜타클(흙)'};
  order.forEach(function(e){
    var pct=total>0?Math.round(scores[e]/total*100):0;
    barsHtml+='<div class="srow"><div class="sinfo"><span class="sname">'+eNames[e]+'</span><span class="snum">'+scores[e]+'점 ('+pct+'%)</span></div><div class="sbar"><div class="sfill" style="width:'+pct+'%;background:'+ELEMENTS[e].barColor+'"></div></div></div>';
  });
  document.getElementById('score-bars').innerHTML=barsHtml;

  var comboKey=main+sub;
  var comboText=COMBOS[comboKey]||'두 원소의 에너지가 조화를 이루는 스타일입니다.';

  var cards='';
  cards+='<div class="rcard"><div class="rcard-title">💪 나의 강점</div><div class="rcard-text">'+el.strength+'</div></div>';
  cards+='<div class="rcard"><div class="rcard-title">⚠️ 지금 점검해야 할 것</div><div class="rcard-text">'+el.weakness+'</div></div>';
  cards+='<div class="rcard"><div class="rcard-title">🎯 교정 방향</div><div class="rcard-text">'+el.fix+'</div></div>';
  cards+='<div class="rcard"><div class="rcard-title">💬 내담자 반응 패턴</div><div class="rcard-text">'+el.pattern+'</div></div>';
  cards+='<div class="combo-box"><div class="combo-title">'+el.emoji+' '+el.name+' + '+subEl.emoji+' '+subEl.name+' 조합</div><div class="combo-text">'+comboText+'</div></div>';
  cards+='<div class="notice-box"><div class="notice-text">⚠️ <strong>이 결과는 Chapter 2, 3 테스트까지 완료한 후 함께 읽을 때 완전해집니다.</strong><br>지금은 내 원소 성향을 확인하는 것으로 충분합니다. 계속 읽어가세요!<br><br>6개월 후, 1년 후에 다시 테스트해보세요. 달라진 결과가 곧 당신의 성장 기록입니다.</div></div>';
  document.getElementById('r-cards').innerHTML=cards;

  document.getElementById('test').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  window.scrollTo(0,0);
}
function restart(){cur=0;ans=[];document.getElementById('result').classList.add('hidden');document.getElementById('intro').classList.remove('hidden');window.scrollTo(0,0);}
